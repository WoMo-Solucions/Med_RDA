<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor RDA Clínico</title>
    <link rel="stylesheet" href="./assets/css/visor-rda.css" />
  </head>
  <body>
    <main class="app-shell" id="app-shell">
      <section class="panel identify-panel" id="auth-panel" aria-live="polite"></section>
      <section class="panel viewer-panel hidden" id="viewer-panel">
        <header id="logos-header" class="logos-header"></header>
        <section class="viewer-layout">
          <aside class="sidebar-column">
            <section id="search-panel" class="filters-panel"></section>
            <section id="filters-panel" class="filters-panel"></section>
          </aside>
          <section class="results-column">
            <article class="panel-inner" id="results-panel"></article>
          </section>
        </section>
      </section>
    </main>

    <aside id="detail-drawer" class="detail-drawer" aria-label="Detalle RDA" aria-hidden="true">
      <div class="detail-drawer-shell">
        <button id="detail-close" type="button" class="detail-close" aria-label="Cerrar">×</button>
        <article id="detail-panel"></article>
      </div>
    </aside>
    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
